---
name: Lint Code Base (actionlint)
run-name: "Lint code base (actionlint) on \"${{ github.event.pull_request.title }}\" by ${{ github.actor }}"

permissions:
  contents: read
  packages: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - .github/workflows
      - .github/actions

jobs:
  actionlint:
    name: "Lint: GitHub Actions"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/takumi-guard-setup

      - name: github actions lint
        uses: reviewdog/action-actionlint@v1
        with:
          filter_mode: diff_context
          fail_on_error: true
          reporter: github-pr-review
          github_token: ${{ secrets.GITHUB_TOKEN }}
